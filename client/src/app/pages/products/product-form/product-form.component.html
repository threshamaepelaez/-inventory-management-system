<div class="p-6 max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">{{ isEditMode ? 'Edit Product' : 'Add Product' }}</h1>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow-md p-6">
    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
      {{ errorMessage }}
    </div>

    <div class="mb-4">
      <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name *</label>
      <input
        type="text"
        id="name"
        formControlName="name"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Product name"
      />
      <div *ngIf="productForm.get('name')?.touched && productForm.get('name')?.invalid" class="text-red-500 text-sm mt-1">
        Name is required (min 2 characters)
      </div>
    </div>

    <div class="mb-4">
      <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
      <textarea
        id="description"
        formControlName="description"
        rows="3"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Product description"
      ></textarea>
    </div>

    <div class="mb-4">
      <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Category</label>
      <input
        type="text"
        id="category"
        formControlName="category"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Product category"
      />
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label for="quantity" class="block text-sm font-medium text-gray-700 mb-2">Quantity *</label>
        <input
          type="number"
          id="quantity"
          formControlName="quantity"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="0"
        />
        <div *ngIf="productForm.get('quantity')?.touched && productForm.get('quantity')?.invalid" class="text-red-500 text-sm mt-1">
          Quantity is required
        </div>
      </div>
      <div>
        <label for="price" class="block text-sm font-medium text-gray-700 mb-2">Price *</label>
        <input
          type="number"
          id="price"
          formControlName="price"
          step="0.01"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="0.00"
        />
        <div *ngIf="productForm.get('price')?.touched && productForm.get('price')?.invalid" class="text-red-500 text-sm mt-1">
          Price is required
        </div>
      </div>
    </div>

    <div class="mb-6">
      <label for="image" class="block text-sm font-medium text-gray-700 mb-2">Product Image</label>
      <input
        type="file"
        id="image"
        (change)="onFileSelected($event)"
        accept="image/*"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <div *ngIf="imagePreview" class="mt-4">
        <img [src]="imagePreview" alt="Preview" class="h-32 w-32 object-cover rounded-md">
      </div>
    </div>

    <div class="flex gap-4">
      <button
        type="submit"
        [disabled]="productForm.invalid || isLoading"
        class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Product' : 'Create Product') }}
      </button>
      <button
        type="button"
        routerLink="/products"
        class="px-6 py-2 border border-gray-300 rounded-md hover:bg-gray-50"
      >
        Cancel
      </button>
    </div>
  </form>
</div>

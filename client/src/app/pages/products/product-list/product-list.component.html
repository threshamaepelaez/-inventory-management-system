<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Products</h1>
    <a *ngIf="isAdmin" routerLink="/products/add" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
      + Add Product
    </a>
  </div>

  <!-- Filters -->
  <div class="mb-6 flex flex-col md:flex-row gap-4">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (keyup.enter)="onSearch()"
      placeholder="Search products..."
      class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <select
      [(ngModel)]="categoryFilter"
      (ngModelChange)="onCategoryChange()"
      class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      <option value="">All Categories</option>
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>
    <button (click)="onSearch()" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">
      Search
    </button>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
    {{ errorMessage }}
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <!-- Products Table -->
  <div *ngIf="!isLoading" class="bg-white rounded-lg shadow-md overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Image</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Quantity</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let product of products" class="hover:bg-gray-50">
          <td class="px-6 py-4 whitespace-nowrap">
            <img *ngIf="product.imageUrl" [src]="'http://localhost:5000' + product.imageUrl" alt="{{ product.name }}" class="h-12 w-12 object-cover rounded">
            <div *ngIf="!product.imageUrl" class="h-12 w-12 bg-gray-200 rounded flex items-center justify-center text-gray-400">No Image</div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ product.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ getCategoryName(product) }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <span [class.text-red-600]="product.quantity < 10">{{ product.quantity }}</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${{ product.price }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
            <a *ngIf="isAdmin" [routerLink]="['/products/edit', product.id]" class="text-blue-600 hover:text-blue-900 mr-3">Edit</a>
            <button *ngIf="isAdmin" (click)="deleteProduct(product.id)" class="text-red-600 hover:text-red-900">Delete</button>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="6" class="px-6 py-4 text-center text-gray-500">No products found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && totalPages > 1" class="mt-4 flex justify-center items-center gap-4">
    <button (click)="previousPage()" [disabled]="currentPage === 1" class="px-4 py-2 border border-gray-300 rounded-md disabled:opacity-50">
      Previous
    </button>
    <span class="text-gray-600">Page {{ currentPage }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages" class="px-4 py-2 border border-gray-300 rounded-md disabled:opacity-50">
      Next
    </button>
  </div>
</div>

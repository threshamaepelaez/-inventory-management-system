<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
  <!-- Total Products -->
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <h2 class="text-lg font-semibold">Total Products</h2>
    <p class="text-2xl font-bold text-blue-600">{{ totalProducts }}</p>
  </div>

  <!-- Low Stock Items -->
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <h2 class="text-lg font-semibold">Low Stock Items</h2>
    <p class="text-2xl font-bold text-red-600">{{ lowStockItems }}</p>
  </div>

  <!-- Categories Count -->
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <h2 class="text-lg font-semibold">Categories</h2>
    <p class="text-2xl font-bold text-green-600">{{ categoriesCount }}</p>
  </div>

  <!-- Welcome Message -->
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <h2 class="text-lg font-semibold">Welcome</h2>
    <p class="text-xl font-bold text-purple-600">{{ currentUserName }}</p>
  </div>
</div>

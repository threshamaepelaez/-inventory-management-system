<nav class="fixed left-0 top-0 h-screen w-60 bg-gray-900 text-white flex flex-col z-50">
  <!-- Logo Section -->
  <div class="p-6 border-b border-gray-800">
    <a routerLink="/dashboard" class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
      </div>
      <div>
        <span class="text-lg font-bold block">Inventory MS</span>
        <span class="text-xs text-gray-400">Management System</span>
      </div>
    </a>
  </div>

  <!-- Navigation Links -->
  <div class="flex-1 py-4">
    <div class="px-4 mb-2">
      <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Menu</span>
    </div>
    
    <a routerLink="/dashboard" routerLinkActive="bg-indigo-600" [routerLinkActiveOptions]="{exact: true}" class="flex items-center px-6 py-3 mx-2 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
      </svg>
      <span class="font-medium">Dashboard</span>
    </a>
    
    <a routerLink="/products" routerLinkActive="bg-indigo-600" class="flex items-center px-6 py-3 mx-2 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      <span class="font-medium">Products</span>
    </a>

    <!-- Admin Section -->
    <div *ngIf="authService.isAdmin()" class="mt-6">
      <div class="px-4 mb-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Admin</span>
      </div>
      
      <a routerLink="/products/add" routerLinkActive="bg-indigo-600" class="flex items-center px-6 py-3 mx-2 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
        <span class="font-medium">Add Product</span>
      </a>
    </div>
  </div>

  <!-- User Section -->
  <div class="p-4 border-t border-gray-800">
    <div class="flex items-center mb-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center">
        <span class="text-sm font-bold">{{ getUserInitials() }}</span>
      </div>
      <div class="ml-3">
        <p class="text-sm font-medium text-white">{{ authService.getCurrentUser()?.name }}</p>
        <p class="text-xs text-gray-400">{{ authService.getCurrentUser()?.email }}</p>
      </div>
    </div>
    <button (click)="logout()" class="w-full flex items-center justify-center px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-medium transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Logout
    </button>
  </div>
</nav>
